<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;

background:
linear-gradient(
rgba(0,0,0,0.55),
rgba(0,0,0,0.55)
),

url("camp.JPEG");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:350px;
background:white;
padding:35px;
border-radius:20px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
margin-bottom:25px;
color:#5b21b6;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
}

select{
width:100%;
padding:14px;
margin-bottom:15px;
border-radius:10px;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#5b21b6;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="login-box">

<h1>🔐 Login</h1>

<select id="role">

<option value="moderator">
Moderator
</option>

<option value="principal">
Principal
</option>

</select>

<input type="text"
id="username"
placeholder="Enter Username">

<input type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">
Login
</button>

</div>

<script>

function login(){

let role =
document.getElementById("role").value;

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

if(
role==="moderator" &&
username==="moderator" &&
password==="1234"
){

window.location.href="moderator.html";

}

else if(
role==="principal" &&
username==="principal" &&
password==="1234"
){

window.location.href="dashboard.html";

}

else{

alert("Invalid Login");

}

}

</script>

</body>
</html>
